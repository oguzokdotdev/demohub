<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>oguzok.tech</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 700px;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 12px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: #cbd5e1;
      margin: 0 0 24px;
    }

    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a {
      color: #0f172a;
      background: #f8fafc;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 600;
    }

    a.secondary {
      background: transparent;
      color: #f8fafc;
      border: 1px solid #334155;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>oguzok.dev</h1>
    <p>
      Личный сайт и пространство моих проектов. Скоро здесь появится DemoHub - интерактивное портфолио.
    </p>

    <div class="links">
      <a class="secondary" href="https://github.com/oguzokdotdev/>Мой GitHub</a>
    </div>
  </div>
</body>
</html>
